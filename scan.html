<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <title>tin · 스캔</title>
  </head>
  <body>
    <div class="scan">
      <header class="scan-head">
        <a class="scan-brand" href="/"><span>tin</span></a>
      </header>

      <main class="scan-grid">
        <!-- 01 · 입력 -->
        <section class="pane">
          <div class="pane-head"><span class="pane-num">01</span>입력</div>
          <div class="pane-body">
            <div class="drop" id="drop" tabindex="0">
              <svg class="drop-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.4">
                <rect x="8" y="12" width="48" height="40" rx="3" />
                <circle cx="22" cy="26" r="4" />
                <path d="M8 44 L24 30 L36 40 L46 32 L56 40" />
              </svg>
              <div class="drop-text">이미지·PDF를 끌어다 놓거나 <em>클릭</em></div>
              <div class="drop-sub">JPG · PNG · PDF · 여러 장 가능 · 순서 변경 가능</div>
              <input type="file" id="fileInput" accept="image/*,.pdf" multiple hidden />
            </div>

            <ul class="filelist" id="fileList"></ul>

            <div class="settings">
              <div class="field">
                <label for="mode">인식</label>
                <select id="mode">
                  <option value="DOCUMENT_TEXT_DETECTION" selected>문서 스캔</option>
                  <option value="TEXT_DETECTION">장면 · 간판</option>
                </select>
              </div>
              <div class="field">
                <label for="lang">언어</label>
                <select id="lang">
                  <option value="ko+en" selected>한 + 영</option>
                  <option value="ko">한국어</option>
                  <option value="en">English</option>
                </select>
              </div>
              <div class="field">
                <label for="reflow">정리</label>
                <select id="reflow">
                  <option value="smart" selected>스마트 (한국어)</option>
                  <option value="concat">모두 붙임 (중·일)</option>
                  <option value="space">공백 (영어)</option>
                  <option value="off">끄기 (원본)</option>
                </select>
              </div>
            </div>

            <details class="advanced">
              <summary>API 키 · 고급 설정</summary>
              <div class="adv-body">
                <div class="keyfield" id="visionKeyField">
                  <label for="visionKey">Vision API 키 <span class="hint">OCR 추출용</span></label>
                  <input type="password" id="visionKey" placeholder="AIza…" autocomplete="off" />
                  <a class="keylink" href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener">키 발급 → Cloud Console (Vision API 활성화 필요)</a>
                </div>
                <div class="keyfield" id="geminiKeyField">
                  <label for="geminiKeys">Gemini API 키 <span class="hint">AI 정리용 · 줄바꿈으로 여러 개</span></label>
                  <textarea id="geminiKeys" rows="2" placeholder="AIza…&#10;AIza… (예비 키)"></textarea>
                  <a class="keylink" href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">키 발급 → Google AI Studio</a>
                </div>
                <div class="keyfield">
                  <label for="model">Gemini 모델 <span class="hint">비우면 기본값</span></label>
                  <input type="text" id="model" placeholder="gemini-1.5-flash" />
                </div>
                <div class="keyfield">
                  <label for="customPrompt">추가 프롬프트 <span class="hint">책별 지시 · 선택</span></label>
                  <textarea id="customPrompt" rows="2" placeholder="예: 주인공 이름은 '서연'. 사투리는 그대로 두세요."></textarea>
                </div>
                <p class="adv-note" id="advNote"></p>
              </div>
            </details>

            <div class="actions">
              <button class="btn primary" id="extractBtn" disabled>텍스트 추출</button>
              <button class="btn" id="resetBtn">초기화</button>
            </div>

            <div class="progress" id="progress" hidden>
              <div class="bar"><i id="bar"></i></div>
              <div class="ptext" id="progressText">시작…</div>
            </div>
          </div>
        </section>

        <!-- 02 · 결과 -->
        <section class="pane">
          <div class="pane-head">
            <span class="pane-num">02</span>결과
            <span class="badge" id="badge">대기</span>
          </div>
          <div class="pane-body result">
            <textarea id="result" placeholder="추출된 텍스트가 여기에 나타납니다. 외부 텍스트를 붙여넣고 [AI 정리]만 돌릴 수도 있어요."></textarea>
            <div class="result-actions">
              <button class="btn" id="fixBtn">규칙 정리</button>
              <button class="btn primary" id="aiBtn">AI 정리</button>
              <button class="btn ghost" id="revertBtn" hidden>되돌리기</button>
              <span class="spacer"></span>
              <button class="btn" id="copyBtn">복사</button>
              <button class="btn" id="dlBtn">.txt 저장</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/src/scan/main.ts"></script>
  </body>
</html>
